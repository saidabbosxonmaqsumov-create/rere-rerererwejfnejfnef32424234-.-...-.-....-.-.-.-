<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>GameMarket UZ</title>
  <link rel="preconnect" href="https://fonts.googleaphttps://github.com/saidabbosxonmaqsumov-create/rere-rerererwejfnejfnef32424234-.-...-.-....-.-.-.-/settingsis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ════════════════════════════════════════
   CONFIG — o'zgartiring
   ════════════════════════════════════════ */
    :root {
      --supabase-url: 'https://llmttyowgohcagllkecg.supabase.co';
      --supabase-key: 'eyJpc3MiOiJzdXBhYmFeyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9zZSIsInJlZiI6ImxsbXR0eW93Z29oY2FnbGxrZWNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMzkwNjQsImV4cCI6MjA4OTYxNTA2NH0.AUENEMfL-PC8I0yfEfu0AIHs9RoVfC35ynpVtfFQnkg
';
      --bot-username: 'gamemarketuz_bot';
    }

    /* ════════════════════════════════════════
   DESIGN TOKENS
   ════════════════════════════════════════ */
    :root {
      /* Base */
      --bg: #070710;
      --bg2: #0d0d1a;
      --bg3: #12121f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface2: rgba(255, 255, 255, 0.07);
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);

      /* Text */
      --t1: #f2f2ff;
      --t2: rgba(242, 242, 255, 0.55);
      --t3: rgba(242, 242, 255, 0.25);

      /* Game palettes */
      --pubg-a: #FFD234;
      --pubg-b: #FF8C00;
      --pubg-glow: rgba(255, 210, 52, 0.15);
      --codm-a: #FF4B5C;
      --codm-b: #C0002E;
      --codm-glow: rgba(255, 75, 92, 0.15);
      --ff-a: #FF7B35;
      --ff-b: #E03200;
      --ff-glow: rgba(255, 123, 53, 0.15);
      --ml-a: #A855F7;
      --ml-b: #6D28D9;
      --ml-glow: rgba(168, 85, 247, 0.15);

      /* Accent */
      --accent: #6C63FF;
      --accent2: #9D97FF;
      --green: #10E89F;
      --red: #FF4B5C;
      --gold: #FFD234;

      /* Spacing */
      --r: 16px;
      --r-sm: 10px;
      --r-lg: 24px;
      --r-xl: 32px;
      --tab-h: 68px;

      /* Fonts */
      --ff-head: 'Clash Display', 'Syne', sans-serif;
      --ff-body: 'Plus Jakarta Sans', 'DM Sans', sans-serif;
    }

    /* ════ RESET ════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent
    }

    html {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--ff-body);
      font-size: 15px;
      overscroll-behavior: none
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom))
    }

    button {
      font-family: var(--ff-body);
      cursor: pointer;
      border: none;
      background: none
    }

    input,
    select {
      font-family: var(--ff-body)
    }

    /* ════ AMBIENT BG ════ */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .ambient-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      transition: all 1.2s ease;
    }

    .blob1 {
      width: 420px;
      height: 420px;
      top: -100px;
      left: -120px;
      background: var(--accent)
    }

    .blob2 {
      width: 360px;
      height: 360px;
      bottom: 80px;
      right: -100px;
      background: #a855f7
    }

    .blob3 {
      width: 280px;
      height: 280px;
      top: 45%;
      left: 40%;
      background: var(--green);
      opacity: 0.08
    }

    /* ════ NOISE ════ */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1;
    }

    /* ════ LAYOUT ════ */
    .app {
      position: relative;
      z-index: 2
    }

    /* ════ TAB BAR ════ */
    .tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      height: var(--tab-h);
      background: rgba(7, 7, 16, 0.85);
      backdrop-filter: blur(24px) saturate(180%);
      border-top: 1px solid var(--glass-border);
      display: flex;
      align-items: stretch;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .tab-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--t3);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      transition: color 0.25s;
      position: relative;
    }

    .tab-item svg {
      width: 22px;
      height: 22px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)
    }

    .tab-item.active {
      color: var(--t1)
    }

    .tab-item.active svg {
      transform: translateY(-2px) scale(1.1)
    }

    .tab-indicator {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 2px;
      border-radius: 0 0 2px 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .tab-item.active .tab-indicator {
      width: 28px
    }

    /* ════ PAGES ════ */
    .page {
      display: none;
      min-height: 100vh;
      animation: pageIn 0.3s ease
    }

    .page.active {
      display: block
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ════ STICKY HEADER ════ */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 16px 18px 12px;
      background: rgba(7, 7, 16, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px
    }

    .logo {
      font-family: var(--ff-head);
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--t1) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo em {
      font-style: normal;
      color: var(--accent)
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--glass-border);
      padding: 5px 10px 5px 6px;
      border-radius: 100px;
    }

    .mini-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .header-user span {
      font-size: 12px;
      font-weight: 500;
      color: var(--t2);
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    /* ════ TYPE TOGGLE ════ */
    .type-toggle {
      display: flex;
      gap: 0;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 4px;
      margin: 14px 18px 0;
    }

    .type-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: calc(var(--r) - 4px);
      color: var(--t2);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .type-btn .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      transition: all 0.25s
    }

    .type-btn.active.sell {
      background: rgba(16, 232, 159, 0.1);
      color: var(--green);
      box-shadow: 0 0 20px rgba(16, 232, 159, 0.08);
    }

    .type-btn.active.sell .dot {
      background: var(--green);
      box-shadow: 0 0 8px var(--green)
    }

    .type-btn.active.buy {
      background: rgba(108, 99, 255, 0.12);
      color: var(--accent2);
      box-shadow: 0 0 20px rgba(108, 99, 255, 0.08);
    }

    .type-btn.active.buy .dot {
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2)
    }

    /* ════ GAME CHIPS ════ */
    .game-chips {
      display: flex;
      gap: 8px;
      padding: 12px 18px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .game-chips::-webkit-scrollbar {
      display: none
    }

    .chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 100px;
      border: 1px solid var(--glass-border);
      background: var(--surface);
      color: var(--t2);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .chip::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.25s;
    }

    .chip.pubg::before {
      background: linear-gradient(135deg, rgba(255, 210, 52, 0.15), rgba(255, 140, 0, 0.08))
    }

    .chip.codm::before {
      background: linear-gradient(135deg, rgba(255, 75, 92, 0.15), rgba(192, 0, 46, 0.08))
    }

    .chip.ff::before {
      background: linear-gradient(135deg, rgba(255, 123, 53, 0.15), rgba(224, 50, 0, 0.08))
    }

    .chip.ml::before {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.15), rgba(109, 40, 217, 0.08))
    }

    .chip.active {
      border-color: transparent;
      color: var(--t1)
    }

    .chip.pubg.active {
      border-color: rgba(255, 210, 52, 0.4)
    }

    .chip.codm.active {
      border-color: rgba(255, 75, 92, 0.4)
    }

    .chip.ff.active {
      border-color: rgba(255, 123, 53, 0.4)
    }

    .chip.ml.active {
      border-color: rgba(168, 85, 247, 0.4)
    }

    .chip.active::before {
      opacity: 1
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: box-shadow 0.25s
    }

    .chip.pubg .chip-dot {
      background: var(--pubg-a)
    }

    .chip.codm .chip-dot {
      background: var(--codm-a)
    }

    .chip.ff .chip-dot {
      background: var(--ff-a)
    }

    .chip.ml .chip-dot {
      background: var(--ml-a)
    }

    .chip.active .chip-dot {
      box-shadow: 0 0 8px currentColor
    }

    /* ════ LISTINGS FEED ════ */
    .feed {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 14px 18px 0
    }

    /* ════ LISTING CARD ════ */
    .lcard {
      border-radius: var(--r-lg);
      border: 1px solid var(--glass-border);
      background: var(--surface);
      overflow: hidden;
      position: relative;
      transition: transform 0.2s, box-shadow 0.3s;
      cursor: default;
    }

    .lcard:active {
      transform: scale(0.98)
    }

    .lcard::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .lcard.pubg::before {
      background: linear-gradient(135deg, rgba(255, 210, 52, 0.06) 0%, transparent 60%)
    }

    .lcard.codm::before {
      background: linear-gradient(135deg, rgba(255, 75, 92, 0.06) 0%, transparent 60%)
    }

    .lcard.ff::before {
      background: linear-gradient(135deg, rgba(255, 123, 53, 0.06) 0%, transparent 60%)
    }

    .lcard.ml::before {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.06) 0%, transparent 60%)
    }

    .lcard:hover::before {
      opacity: 1
    }

    /* Blue badge: premium glow border */
    .lcard.badge-blue {
      border-color: rgba(108, 99, 255, 0.35);
      box-shadow: 0 0 0 1px rgba(108, 99, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .lcard.badge-silver {
      border-color: rgba(176, 184, 204, 0.25);
    }

    /* Top accent bar */
    .card-bar {
      height: 3px;
      width: 100%
    }

    .lcard.pubg .card-bar {
      background: linear-gradient(90deg, var(--pubg-a), var(--pubg-b))
    }

    .lcard.codm .card-bar {
      background: linear-gradient(90deg, var(--codm-a), var(--codm-b))
    }

    .lcard.ff .card-bar {
      background: linear-gradient(90deg, var(--ff-a), var(--ff-b))
    }

    .lcard.ml .card-bar {
      background: linear-gradient(90deg, var(--ml-a), var(--ml-b))
    }

    .card-inner {
      padding: 14px 16px
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .card-game-info {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .game-icon-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
    }

    .lcard.pubg .game-icon-pill {
      background: rgba(255, 210, 52, 0.12);
      color: var(--pubg-a)
    }

    .lcard.codm .game-icon-pill {
      background: rgba(255, 75, 92, 0.12);
      color: var(--codm-a)
    }

    .lcard.ff .game-icon-pill {
      background: rgba(255, 123, 53, 0.12);
      color: var(--ff-a)
    }

    .lcard.ml .game-icon-pill {
      background: rgba(168, 85, 247, 0.12);
      color: var(--ml-a)
    }

    .badge-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .badge-chip.blue {
      background: rgba(108, 99, 255, 0.2);
      color: var(--accent2);
      border: 1px solid rgba(108, 99, 255, 0.3)
    }

    .badge-chip.silver {
      background: rgba(176, 184, 204, 0.12);
      color: #c8cfe0;
      border: 1px solid rgba(176, 184, 204, 0.2)
    }

    .card-main {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .card-amount {
      font-family: var(--ff-head);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .card-price-block {
      text-align: right
    }

    .card-price {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--green), #00d4aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-currency {
      font-size: 11px;
      color: var(--t2);
      margin-top: 1px
    }

    .type-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .type-badge.sell {
      background: rgba(16, 232, 159, 0.1);
      color: var(--green)
    }

    .type-badge.buy {
      background: rgba(108, 99, 255, 0.1);
      color: var(--accent2)
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .seller-row {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .seller-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .lcard.pubg .seller-avatar {
      background: linear-gradient(135deg, var(--pubg-a), var(--pubg-b))
    }

    .lcard.codm .seller-avatar {
      background: linear-gradient(135deg, var(--codm-a), var(--codm-b))
    }

    .lcard.ff .seller-avatar {
      background: linear-gradient(135deg, var(--ff-a), var(--ff-b))
    }

    .lcard.ml .seller-avatar {
      background: linear-gradient(135deg, var(--ml-a), var(--ml-b))
    }

    .seller-info {}

    .seller-id {
      font-size: 12px;
      font-weight: 600;
      color: var(--t1)
    }

    .seller-trades {
      font-size: 11px;
      color: var(--t2)
    }

    .rating-pill {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(255, 210, 52, 0.1);
      padding: 5px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--gold);
      border: 1px solid rgba(255, 210, 52, 0.15);
    }

    .payment-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .pay-chip {
      padding: 3px 9px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--t2);
    }

    .connect-btn {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      border-radius: var(--r-sm);
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .connect-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: rgba(255, 255, 255, 0.1);
      transition: opacity 0.2s;
    }

    .connect-btn:active::before {
      opacity: 1
    }

    .connect-btn:active {
      transform: scale(0.98)
    }

    .lcard.pubg .connect-btn {
      background: linear-gradient(135deg, var(--pubg-a), var(--pubg-b))
    }

    .lcard.codm .connect-btn {
      background: linear-gradient(135deg, var(--codm-a), var(--codm-b))
    }

    .lcard.ff .connect-btn {
      background: linear-gradient(135deg, var(--ff-a), var(--ff-b))
    }

    .lcard.ml .connect-btn {
      background: linear-gradient(135deg, var(--ml-a), var(--ml-b))
    }

    .lcard.badge-blue .connect-btn {
      background: linear-gradient(135deg, var(--accent), #9d50ff);
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.35);
    }

    .mine-chip {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border-radius: var(--r-sm);
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      border: 1px dashed rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: var(--t2);
    }

    /* ════ EMPTY STATE ════ */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 52px;
      margin-bottom: 16px;
      filter: grayscale(0.3)
    }

    .empty h3 {
      font-family: var(--ff-head);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px
    }

    .empty p {
      font-size: 14px;
      color: var(--t2);
      line-height: 1.6
    }

    /* ════ LOADER ════ */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      gap: 14px
    }

    .spinner {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 255, 255, 0.08);
      border-top-color: var(--accent);
      animation: spin 0.65s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loader p {
      font-size: 13px;
      color: var(--t2)
    }

    /* ════ SKELETON ════ */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: var(--r-sm);
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      to {
        background-position: -200% 0
      }
    }

    /* ════ BOTTOM SHEET ════ */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, 0);
      display: none;
      backdrop-filter: blur(0);
      transition: all 0.3s;
    }

    .sheet-overlay.open {
      display: flex;
      align-items: flex-end;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }

    .sheet {
      width: 100%;
      background: var(--bg2);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      border-top: 1px solid var(--glass-border);
      max-height: 92vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sheet-overlay.open .sheet {
      transform: translateY(0)
    }

    .sheet-handle {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255, 255, 255, 0.15);
      margin: 14px auto 0;
    }

    .sheet-header {
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .sheet-title {
      font-family: var(--ff-head);
      font-size: 19px;
      font-weight: 700
    }

    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      color: var(--t2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      transition: all 0.2s;
    }

    .sheet-close:hover {
      background: var(--surface);
      color: var(--t1)
    }

    .sheet-body {
      padding: 20px
    }

    /* ════ FORM ════ */
    .form-group {
      margin-bottom: 20px
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--glass-border);
      border-radius: var(--r-sm);
      color: var(--t1);
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      -webkit-appearance: none;
    }

    .form-input:focus {
      border-color: rgba(108, 99, 255, 0.5);
      background: rgba(108, 99, 255, 0.05)
    }

    .form-input::placeholder {
      color: var(--t3)
    }

    /* Type selector */
    .type-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .type-option {
      padding: 16px 12px;
      border-radius: var(--r);
      border: 1.5px solid var(--glass-border);
      background: var(--surface);
      text-align: center;
      transition: all 0.25s;
    }

    .type-option .to-icon {
      font-size: 24px;
      margin-bottom: 6px
    }

    .type-option .to-label {
      font-size: 14px;
      font-weight: 600
    }

    .type-option .to-sub {
      font-size: 11px;
      color: var(--t2);
      margin-top: 3px
    }

    .type-option.active.sell {
      border-color: var(--green);
      background: rgba(16, 232, 159, 0.07)
    }

    .type-option.active.buy {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.07)
    }

    /* Game grid */
    .game-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .game-option {
      padding: 14px 12px;
      border-radius: var(--r);
      border: 1.5px solid var(--glass-border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.25s;
    }

    .game-option .go-icon {
      font-size: 22px
    }

    .game-option .go-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--t1)
    }

    .game-option .go-sub {
      font-size: 11px;
      color: var(--t2);
      margin-top: 1px
    }

    .game-option.active.pubg {
      border-color: rgba(255, 210, 52, 0.5);
      background: rgba(255, 210, 52, 0.06)
    }

    .game-option.active.codm {
      border-color: rgba(255, 75, 92, 0.5);
      background: rgba(255, 75, 92, 0.06)
    }

    .game-option.active.ff {
      border-color: rgba(255, 123, 53, 0.5);
      background: rgba(255, 123, 53, 0.06)
    }

    .game-option.active.ml {
      border-color: rgba(168, 85, 247, 0.5);
      background: rgba(168, 85, 247, 0.06)
    }

    /* Payment info */
    .pay-info-box {
      padding: 14px;
      border-radius: var(--r-sm);
      background: rgba(108, 99, 255, 0.07);
      border: 1px solid rgba(108, 99, 255, 0.2);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pay-info-box svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      color: var(--accent2)
    }

    .pay-info-box p {
      font-size: 13px;
      color: var(--t2);
      line-height: 1.5
    }

    /* Submit */
    .submit-btn {
      width: 100%;
      padding: 15px;
      border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--accent), #9d50ff);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 24px rgba(108, 99, 255, 0.4);
      transition: all 0.25s;
      margin-top: 4px;
    }

    .submit-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 12px rgba(108, 99, 255, 0.3)
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed
    }

    /* ════ PROFILE ════ */
    .profile-hero {
      padding: 32px 20px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ff-head);
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      position: relative;
      margin-bottom: 14px;
    }

    .profile-avatar::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      z-index: -1;
      opacity: 0.3;
      filter: blur(8px);
    }

    .profile-name {
      font-family: var(--ff-head);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px
    }

    .profile-handle {
      font-size: 13px;
      color: var(--t2);
      margin-top: 4px
    }

    .profile-badge-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      justify-content: center
    }

    .profile-badge {
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
    }

    .profile-badge.free {
      background: var(--surface2);
      color: var(--t2);
      border: 1px solid var(--glass-border)
    }

    .profile-badge.silver {
      background: rgba(176, 184, 204, 0.12);
      color: #c8cfe0;
      border: 1px solid rgba(176, 184, 204, 0.2)
    }

    .profile-badge.blue {
      background: rgba(108, 99, 255, 0.18);
      color: var(--accent2);
      border: 1px solid rgba(108, 99, 255, 0.3);
      box-shadow: 0 0 16px rgba(108, 99, 255, 0.2)
    }

    .exp-badge {
      font-size: 12px;
      color: var(--t2);
      padding: 5px 12px;
      border-radius: 100px;
      background: var(--surface2)
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 0 18px 18px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 16px 10px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--ff-head);
      font-size: 24px;
      font-weight: 700
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--t2);
      margin-top: 4px
    }

    .section-head {
      padding: 0 18px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--t3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* My listings */
    .my-list {
      margin: 0 18px;
      border-radius: var(--r);
      overflow: hidden;
      border: 1px solid var(--glass-border)
    }

    .my-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      transition: background 0.2s;
    }

    .my-row:last-child {
      border-bottom: none
    }

    .my-row:hover {
      background: var(--surface2)
    }

    .my-row-left {
      flex: 1;
      overflow: hidden
    }

    .my-row-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .my-row-meta {
      font-size: 12px;
      color: var(--t2);
      margin-top: 2px
    }

    .del-btn {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      flex-shrink: 0;
      margin-left: 10px;
      background: rgba(255, 75, 92, 0.1);
      border: 1px solid rgba(255, 75, 92, 0.2);
      color: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .del-btn:hover {
      background: rgba(255, 75, 92, 0.2)
    }

    .del-btn svg {
      width: 15px;
      height: 15px
    }

    /* ════ ADMIN ════ */
    .admin-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 18px 0;
    }

    .astat {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 16px;
    }

    .astat-val {
      font-family: var(--ff-head);
      font-size: 26px;
      font-weight: 700
    }

    .astat-lbl {
      font-size: 11px;
      color: var(--t2);
      margin-top: 3px
    }

    .admin-list {
      padding: 0 18px
    }

    .admin-card {
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: var(--r);
      padding: 14px;
      margin-bottom: 10px;
    }

    .admin-card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px
    }

    .admin-card-name {
      font-size: 14px;
      font-weight: 600
    }

    .admin-card-meta {
      font-size: 12px;
      color: var(--t2);
      margin-top: 3px
    }

    .admin-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px
    }

    .a-btn {
      padding: 6px 12px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .a-btn.danger {
      background: rgba(255, 75, 92, 0.12);
      color: var(--red)
    }

    .a-btn.success {
      background: rgba(16, 232, 159, 0.1);
      color: var(--green)
    }

    .a-btn.accent {
      background: rgba(108, 99, 255, 0.12);
      color: var(--accent2)
    }

    .a-btn.muted {
      background: rgba(255, 255, 255, 0.05);
      color: var(--t2)
    }

    .a-btn:active {
      transform: scale(0.95)
    }

    .badge-select {
      padding: 6px 8px;
      background: var(--bg3);
      border: 1px solid var(--glass-border);
      color: var(--t1);
      border-radius: 7px;
      font-size: 12px;
      outline: none;
    }

    /* ════ TOAST ════ */
    .toast {
      position: fixed;
      bottom: calc(var(--tab-h) + 14px);
      left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: rgba(20, 20, 32, 0.95);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      color: var(--t1);
      padding: 11px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    .toast.ok {
      border-color: rgba(16, 232, 159, 0.4)
    }

    .toast.ok::before {
      content: '✓';
      color: var(--green);
      font-weight: 700
    }

    .toast.err {
      border-color: rgba(255, 75, 92, 0.4)
    }

    .toast.err::before {
      content: '✕';
      color: var(--red);
      font-weight: 700
    }

    /* ════ POST PAGE (standalone) ════ */
    #page-post .sheet-body {
      padding: 20px 18px
    }

    /* ════ SPACERS ════ */
    .sp8 {
      height: 8px
    }

    .sp12 {
      height: 12px
    }

    .sp16 {
      height: 16px
    }

    .sp20 {
      height: 20px
    }
  </style>
</head>

    <button class="tab-item" id="tab-profile" onclick="goTab('profile',this)">
      <div class="tab-indicator"></div>
      <svg fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
        <path stroke-linecap="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Profil
    </button>
    <button class="tab-item" id="tab-admin" style="display:none" onclick="goTab('admin',this)">
      <div class="tab-indicator"></div>
      <svg fill="none" stroke="currentColor" stroke-width="1.7" viewBox="0 0 24 24">
        <path stroke-linecap="round"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
      </svg>
      Admin
    </button>
  </nav>

  <div class="toast" id="toast"></div>

  <!-- ══════════════════════════ JS ══════════════════════════ -->
  <script>
    // ─── CONFIG ───────────────────────────────────────────────────
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const BOT_USERNAME = 'YOUR_BOT_USERNAME';
    const ADMIN_TG_ID = 0; // o'zingizning Telegram ID raqamingiz

    const GAMES = {
      pubg: { name: 'PUBG Mobile UC', icon: '🎮', short: 'PUBG UC' },
      codm: { name: 'CODM CP', icon: '🎯', short: 'CODM CP' },
      ff: { name: 'Free Fire Diamonds', icon: '🔥', short: 'Free Fire' },
      ml: { name: 'Mobile Legends', icon: '⚔️', short: 'ML Diamonds' },
    };

    // ─── SUPABASE ─────────────────────────────────────────────────
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ─── TELEGRAM ─────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    const tgUser = tg?.initDataUnsafe?.user || null;
    const tgId = tgUser?.id || null;
    tg?.ready(); tg?.expand();

    // ─── STATE ────────────────────────────────────────────────────
    let state = {
      game: 'pubg', type: 'sell',
      postGame: 'pubg', postType: 'sell',
      user: null, isAdmin: false,
    };

    // ─── AMBIENT: shift blob color based on selected game ─────────
    const blobColors = {
      pubg: ['#FFD234', '#FF8C00'],
      codm: ['#FF4B5C', '#C0002E'],
      ff: ['#FF7B35', '#E03200'],
      ml: ['#A855F7', '#6D28D9'],
    };
    function updateAmbient(game) {
      const [c1, c2] = blobColors[game] || blobColors.pubg;
      document.getElementById('blob1').style.background = c1;
      document.getElementById('blob2').style.background = c2;
    }

    // ─── INIT ─────────────────────────────────────────────────────
    async function init() {
      if (tgId) {
        const init = tgUser.first_name || ('ID:' + tgId);
        const av = (tgUser.first_name || 'G').charAt(0).toUpperCase();
        document.getElementById('hdr-name').textContent = init;
        document.getElementById('hdr-avatar').textContent = av;

        await ensureUser();
        state.isAdmin = tgId === ADMIN_TG_ID;
        if (state.isAdmin) document.getElementById('tab-admin').style.display = '';
      }
      loadFeed();
    }

    async function ensureUser() {
      const { data } = await db.from('users').select('*').eq('telegram_id', tgId).single();
      if (!data) {
        await db.from('users').insert({
          telegram_id: tgId,
          username: tgUser?.username || '',
          full_name: tgUser?.first_name || '',
          rating_sum: 0, rating_count: 0,
        });
        state.user = (await db.from('users').select('*').eq('telegram_id', tgId).single()).data;
      } else {
        state.user = data;
      }
    }

    // ─── TAB ──────────────────────────────────────────────────────
    function goTab(name, el) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      el.classList.add('active');
      if (name === 'profile') loadProfile();
      if (name === 'admin' && state.isAdmin) loadAdmin();
    }

    // ─── MARKET ───────────────────────────────────────────────────
    function setType(t) {
      state.type = t;
      document.getElementById('btn-sell').classList.toggle('active', t === 'sell');
      document.getElementById('btn-buy').classList.toggle('active', t === 'buy');
      loadFeed();
    }

    function selectGame(el) {
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      state.game = el.dataset.game;
      updateAmbient(state.game);
      loadFeed();
    }

    async function loadFeed() {
      const feed = document.getElementById('feed');
      feed.innerHTML = '<div class="loader"><div class="spinner"></div><p>Yuklanmoqda…</p></div>';

      const now = new Date().toISOString();
      const { data, error } = await db
        .from('listings')
        .select('*, users!listings_seller_id_fkey(rating_sum,rating_count,total_trades,badge)')
        .eq('game', state.game)
        .eq('listing_type', state.type)
        .eq('is_active', true)
        .gt('expires_at', now);

      if (error || !data || !data.length) {
        const label = state.type === 'sell' ? 'sotish' : 'sotib olish';
        feed.innerHTML = `
      <div class="empty">
        <div class="empty-icon">${GAMES[state.game].icon}</div>
        <h3>E'lon yo'q</h3>
        <p>${GAMES[state.game].name} uchun ${label} e'lonlari hozircha yo'q.<br>Birinchi bo'lib e'lon joylaing!</p>
      </div>`;
        return;
      }

      // Sort: blue > silver > free
      const ord = { blue: 0, silver: 1, free: 2 };
      data.sort((a, b) => (ord[a.badge_type] ?? 2) - (ord[b.badge_type] ?? 2));

      feed.innerHTML = data.map(l => cardHTML(l)).join('');
    }

    function cardHTML(l) {
      const u = l.users || {};
      const rc = u.rating_count || 0;
      const rs = u.rating_sum || 0;
      const rat = rc > 0 ? (rs / rc).toFixed(1) : '0.0';
      const trd = u.total_trades || 0;
      const btype = l.badge_type || 'free';
      const ltype = l.listing_type || 'sell';
      const did = String(l.seller_id).slice(-4);
      const pays = (l.payment_methods || []).join(' · ') || 'Karta';
      const mine = tgId && l.seller_id === tgId;
      const g = GAMES[l.game] || {};
      const priceNum = parseInt(String(l.price).replace(/\D/g, '')) || 0;

      const badgeEl = btype !== 'free' ? `
    <div class="badge-chip ${btype}">
      ${btype === 'blue' ? '💎 Blue' : '🔘 Silver'}
    </div>` : '';

      const typeEl = `<span class="type-badge ${ltype}">${ltype === 'sell' ? '💰 Sotaman' : '🛒 Sotib olaman'}</span>`;

      const actionEl = mine
        ? `<div class="mine-chip">📌 Sizning e'loningiz</div>`
        : `<button class="connect-btn" onclick="openChat(${l.id})">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        ${ltype === 'sell' ? 'Bog\'lanish' : 'Murojaat qilish'}
      </button>`;

      return `
  <div class="lcard ${l.game} badge-${btype}">
    <div class="card-bar"></div>
    <div class="card-inner">
      <div class="card-head">
        <div class="game-icon-pill">${g.icon} ${g.short || g.name}</div>
        ${badgeEl}
      </div>
      ${typeEl}
      <div class="card-main">
        <div class="card-amount">${esc(l.amount)}</div>
        <div class="card-price-block">
          <div class="card-price">${priceNum.toLocaleString('uz-UZ')}</div>
          <div class="card-currency">UZS</div>
        </div>
      </div>
      <div class="payment-row">
        ${(l.payment_methods || ['Click', 'Payme']).map(p => `<span class="pay-chip">${p}</span>`).join('')}
      </div>
      <div class="card-footer">
        <div class="seller-row">
          <div class="seller-avatar">#${did}</div>
          <div class="seller-info">
            <div class="seller-id">Foydalanuvchi #${did}</div>
            <div class="seller-trades">${trd} muvaffaqiyatli savdo</div>
          </div>
        </div>
        <div class="rating-pill">⭐ ${rat}</div>
      </div>
      ${actionEl}
    </div>
  </div>`;
    }

    function openChat(lid) {
      if (!tgId) { toast('Telegram orqali oching', 'err'); return; }
      const url = `https://t.me/${BOT_USERNAME}?start=listing_${lid}`;
      if (tg?.openTelegramLink) tg.openTelegramLink(url);
      else window.open(url, '_blank');
    }

    // ─── POST ─────────────────────────────────────────────────────
    function setPostType(t) {
      state.postType = t;
      ['sell', 'buy'].forEach(x => {
        const el = document.getElementById('pt-' + x);
        el.className = `type-option ${x}${t === x ? ' active' : ''}`;
      });
    }

    function setPostGame(el) {
      document.querySelectorAll('.game-option').forEach(e => {
        e.className = `game-option ${e.dataset.game}`;
      });
      el.className = `game-option ${el.dataset.game} active`;
      state.postGame = el.dataset.game;
    }

    async function submitPost() {
      if (!tgId) { toast('Telegram orqali kirganingizda e\'lon joylay olasiz', 'err'); return; }
      const amount = document.getElementById('p-amount').value.trim();
      const priceRaw = document.getElementById('p-price').value.trim();
      if (!amount) { toast('Miqdorni kiriting', 'err'); return; }
      if (!priceRaw || isNaN(priceRaw)) { toast('Narxni kiriting', 'err'); return; }
      const price = parseInt(priceRaw);
      if (price < 1000 || price > 100_000_000) { toast('Narx: 1,000 – 100,000,000 UZS', 'err'); return; }

      // Re-fetch user to get latest badge
      const { data: u } = await db.from('users').select('*').eq('telegram_id', tgId).single();
      state.user = u;
      const badge = u?.badge || 'free';

      // Free tier: 1 active listing
      if (badge === 'free') {
        const now = new Date().toISOString();
        const { data: al } = await db.from('listings').select('id')
          .eq('seller_id', tgId).eq('is_active', true).gt('expires_at', now);
        if (al && al.length >= 1) { toast('Free: faqat 1 ta aktiv e\'lon', 'err'); return; }
      }

      const btn = document.getElementById('post-btn');
      btn.disabled = true; btn.textContent = 'Joylanyapti…';

      const hours = badge === 'free' ? 15 : 24;
      const exp = new Date(Date.now() + hours * 3600000).toISOString();

      const { error } = await db.from('listings').insert({
        seller_id: tgId,
        listing_type: state.postType,
        game: state.postGame,
        amount,
        price: String(price),
        payment_methods: ['Click', 'Payme'],
        duration_hours: hours,
        badge_type: badge,
        is_active: true,
        expires_at: exp,
      });

      btn.disabled = false; btn.innerHTML = '✦ E\'lonni joylash';

      if (error) { toast('Xato: ' + error.message, 'err'); return; }

      // Weekly counter (free tier)
      if (badge === 'free') {
        const ws = weekStart();
        const { data: wk } = await db.from('weekly_listings').select('listing_count')
          .eq('user_id', tgId).eq('week_start', ws).single();
        if (wk) await db.from('weekly_listings').update({ listing_count: (wk.listing_count || 0) + 1 })
          .eq('user_id', tgId).eq('week_start', ws);
        else await db.from('weekly_listings').insert({ user_id: tgId, week_start: ws, listing_count: 1 });
      }

      toast('E\'lon joylandi!', 'ok');
      document.getElementById('p-amount').value = '';
      document.getElementById('p-price').value = '';
      setTimeout(() => goTab('market', document.getElementById('tab-market')), 1400);
    }

    // ─── PROFILE ──────────────────────────────────────────────────
    async function loadProfile() {
      const c = document.getElementById('profile-content');
      if (!tgId) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">🔒</div><h3>Kirish kerak</h3><p>Profilni ko'rish uchun<br>Telegram orqali oching.</p></div>`;
        return;
      }
      c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

      const { data: u } = await db.from('users').select('*').eq('telegram_id', tgId).single();
      if (!u) return;
      state.user = u;

      const rc = u.rating_count || 0, rs = u.rating_sum || 0;
      const rat = rc > 0 ? (rs / rc).toFixed(1) : '0.0';
      const av = (u.full_name || tgUser?.first_name || 'U').charAt(0).toUpperCase();
      const bdg = { free: '🆓 Free', silver: '🔘 Silver', blue: '💎 Blue' }[u.badge] || 'Free';

      let expHtml = '';
      if (u.badge !== 'free' && u.badge_expires_at) {
        const days = Math.max(0, Math.floor((new Date(u.badge_expires_at) - new Date()) / 86400000));
        expHtml = `<span class="exp-badge">📅 ${days} kun qoldi</span>`;
      }

      const now = new Date().toISOString();
      const { data: myL } = await db.from('listings').select('*')
        .eq('seller_id', tgId).eq('is_active', true).gt('expires_at', now)
        .order('created_at', { ascending: false });
      const listings = myL || [];

      const listingsHTML = listings.length === 0
        ? `<div class="empty" style="padding:24px 20px"><div class="empty-icon" style="font-size:36px">📭</div><p>Aktiv e'lonlar yo'q</p></div>`
        : `<div class="my-list">
        ${listings.map((l, i) => `
          <div class="my-row">
            <div class="my-row-left">
              <div class="my-row-name">${l.listing_type === 'buy' ? '🛒' : '💰'} ${GAMES[l.game]?.icon || ''} ${esc(l.amount)} — ${fmt(l.price)} UZS</div>
              <div class="my-row-meta">${GAMES[l.game]?.name || l.game} · ${(l.expires_at || '').slice(0, 10)}</div>
            </div>
            <button class="del-btn" onclick="delListing(${l.id})" title="O'chirish">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>`).join('')}
       </div>`;

      c.innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar">${av}</div>
      <div class="profile-name">${esc(u.full_name || tgUser?.first_name || 'User')}</div>
      ${u.username ? `<div class="profile-handle">@${esc(u.username)}</div>` : ''}
      <div class="profile-badge-row">
        <span class="profile-badge ${u.badge}">${bdg}</span>
        ${expHtml}
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-val">${rat}</div>
        <div class="stat-lbl">⭐ Reyting</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${u.total_trades || 0}</div>
        <div class="stat-lbl">📦 Savdolar</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${listings.length}</div>
        <div class="stat-lbl">📢 E'lonlar</div>
      </div>
    </div>

    <div class="section-head">Aktiv E'lonlarim</div>
    ${listingsHTML}
    <div class="sp20"></div>
  `;
    }

    async function delListing(id) {
      if (!confirm('E\'lonni o\'chirishni tasdiqlaysizmi?')) return;
      const { error } = await db.from('listings')
        .update({ is_active: false }).eq('id', id).eq('seller_id', tgId);
      if (error) toast('Xato: ' + error.message, 'err');
      else { toast('E\'lon o\'chirildi', 'ok'); loadProfile(); }
    }

    // ─── ADMIN ────────────────────────────────────────────────────
    async function loadAdmin() {
      const c = document.getElementById('admin-content');
      if (!state.isAdmin) {
        c.innerHTML = `<div class="empty"><div class="empty-icon">🔒</div><h3>Ruxsat yo'q</h3><p>Bu sahifa faqat admin uchun.</p></div>`;
        return;
      }
      c.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

      const now = new Date().toISOString();
      const [uRes, lRes, oRes, rRes] = await Promise.all([
        db.from('users').select('badge,is_banned'),
        db.from('listings').select('id').eq('is_active', true).gt('expires_at', now),
        db.from('orders').select('id'),
        db.from('reports').select('id').eq('status', 'pending'),
      ]);
      const us = uRes.data || [], ls = lRes.data || [], os = oRes.data || [], rs2 = rRes.data || [];

      const { data: allU } = await db.from('users').select('*').order('created_at', { ascending: false }).limit(50);
      const { data: allL } = await db.from('listings').select('*').eq('is_active', true).gt('expires_at', now).order('created_at', { ascending: false }).limit(30);

      c.innerHTML = `
    <div class="admin-grid">
      <div class="astat"><div class="astat-val">${us.length}</div><div class="astat-lbl">👥 Foydalanuvchilar</div></div>
      <div class="astat"><div class="astat-val">${ls.length}</div><div class="astat-lbl">📢 Aktiv e'lonlar</div></div>
      <div class="astat"><div class="astat-val">${os.length}</div><div class="astat-lbl">📦 Buyurtmalar</div></div>
      <div class="astat"><div class="astat-val" style="color:var(--red)">${rs2.length}</div><div class="astat-lbl">🚨 Shikoyatlar</div></div>
      <div class="astat"><div class="astat-val" style="color:#c8cfe0">${us.filter(u => u.badge === 'silver').length}</div><div class="astat-lbl">🔘 Silver</div></div>
      <div class="astat"><div class="astat-val" style="color:var(--accent2)">${us.filter(u => u.badge === 'blue').length}</div><div class="astat-lbl">💎 Blue</div></div>
    </div>

    <div class="sp16"></div>
    <div class="section-head">E'lonlar</div>
    <div class="admin-list">
      ${(allL || []).map(l => {
        const g = GAMES[l.game] || {};
        return `<div class="admin-card" id="al-${l.id}">
          <div class="admin-card-head">
            <div>
              <div class="admin-card-name">${g.icon || ''} ${esc(l.amount)} — ${fmt(l.price)} UZS</div>
              <div class="admin-card-meta">${g.name || l.game} · ${l.listing_type === 'buy' ? 'Sotib olish' : 'Sotish'} · ID: ${l.seller_id}</div>
            </div>
            <button class="a-btn danger" onclick="aDelListing(${l.id})">O'chirish</button>
          </div>
        </div>`;
      }).join('') || `<p style="color:var(--t2);font-size:14px;padding:12px 0">E'lonlar yo'q</p>`}
    </div>

    <div class="section-head">Foydalanuvchilar</div>
    <div class="admin-list">
      ${(allU || []).map(u => {
        const name = esc(u.full_name || u.username || 'User');
        const banBtn = u.is_banned
          ? `<button class="a-btn success" onclick="aUnban(${u.telegram_id},this)">Unban</button>`
          : `<button class="a-btn danger"  onclick="aBan(${u.telegram_id},this)">Ban</button>`;
        return `<div class="admin-card" id="ur-${u.telegram_id}">
          <div class="admin-card-name">${name}${u.is_banned ? ' 🚫' : ''}</div>
          <div class="admin-card-meta">ID: ${u.telegram_id} · ${u.total_trades || 0} savdo${u.badge !== 'free' ? ' · ' + u.badge : ''}</div>
          <div class="admin-actions">
            <select class="badge-select" id="bs-${u.telegram_id}">
              <option value="free"   ${u.badge === 'free' ? 'selected' : ''}>Free</option>
              <option value="silver" ${u.badge === 'silver' ? 'selected' : ''}>Silver</option>
              <option value="blue"   ${u.badge === 'blue' ? 'selected' : ''}>Blue</option>
            </select>
            <button class="a-btn accent" onclick="aSetBadge(${u.telegram_id})">Saqlash</button>
            ${banBtn}
          </div>
        </div>`;
      }).join('') || `<p style="color:var(--t2);font-size:14px;padding:12px 0">Foydalanuvchilar yo'q</p>`}
    </div>
    <div class="sp20"></div>
  `;
    }

    async function aDelListing(id) {
      if (!confirm('O\'chirilsinmi?')) return;
      await db.from('listings').update({ is_active: false }).eq('id', id);
      document.getElementById('al-' + id)?.remove();
      toast('E\'lon o\'chirildi', 'ok');
    }
    async function aBan(uid, btn) {
      if (!confirm('Ban berilsinmi?')) return;
      btn.disabled = true;
      const { data: u } = await db.from('users').select('ban_count').eq('telegram_id', uid).single();
      await db.from('users').update({ is_banned: true, ban_count: (u?.ban_count || 0) + 1 }).eq('telegram_id', uid);
      toast('User banlandi', 'ok'); loadAdmin();
    }
    async function aUnban(uid, btn) {
      btn.disabled = true;
      await db.from('users').update({ is_banned: false }).eq('telegram_id', uid);
      toast('Ban olib tashlandi', 'ok'); loadAdmin();
    }
    async function aSetBadge(uid) {
      const badge = document.getElementById('bs-' + uid)?.value;
      const exp = badge !== 'free' ? new Date(Date.now() + 30 * 86400000).toISOString() : null;
      await db.from('users').update({ badge, badge_expires_at: exp }).eq('telegram_id', uid);
      toast('Badge yangilandi: ' + badge, 'ok');
    }

    // ─── HELPERS ──────────────────────────────────────────────────
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function fmt(p) { return (parseInt(String(p).replace(/\D/g, '')) || 0).toLocaleString('uz-UZ'); }
    function weekStart() {
      const d = new Date(), day = d.getDay() || 7;
      d.setDate(d.getDate() - day + 1); return d.toISOString().split('T')[0];
    }

    let _tt;
    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show ' + (type || '');
      clearTimeout(_tt); _tt = setTimeout(() => el.className = 'toast', 2800);
    }

    // ─── START ────────────────────────────────────────────────────
    init();
  </script>
</body>

</html>
